services:
  soundpull:
    # Use the published image, or `docker compose build` to build locally.
    image: ghcr.io/rocho-el-locho/soundpull:latest
    build: .
    container_name: soundpull
    restart: unless-stopped
    env_file: .env
    # Named volumes inherit the image's nonroot ownership (uid 65532), so the
    # distroless non-root user can write to them. (/downloads is just staging.)
    volumes:
      - soundpull-data:/data            # SQLite DB (DATABASE_URL=sqlite:////data/app.db)
      - soundpull-downloads:/downloads  # ZIP packaging / WebDAV work dir
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      # Replace the host and certresolver with your real values.
      - "traefik.http.routers.soundpull.rule=Host(`soundpull.example.org`)"
      - "traefik.http.routers.soundpull.entrypoints=websecure"
      - "traefik.http.routers.soundpull.tls=true"
      - "traefik.http.routers.soundpull.tls.certresolver=letsencrypt"
      - "traefik.http.services.soundpull.loadbalancer.server.port=8080"

# Traefik provides TLS termination and routing; OIDC auth happens inside the app.
# NiceGUI uses WebSockets — Traefik forwards these by default, no extra config needed.
networks:
  proxy:
    external: true

volumes:
  soundpull-data:
  soundpull-downloads:
